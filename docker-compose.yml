version: '3.9'

services:
  backend:
    build: ./backend
    container_name: rf-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - INFLUXDB_URL=http://influxdb:8086
    depends_on:
      - redis
      - influxdb
    volumes:
      - ./backend:/app
    networks:
      - rf-net

  frontend:
    build: ./frontend
    container_name: rf-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - rf-net

  redis:
    image: redis:7-alpine
    container_name: rf-redis
    ports:
      - "6379:6379"
    networks:
      - rf-net

  influxdb:
    image: influxdb:2.7
    container_name: rf-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=rfplatform2026
      - DOCKER_INFLUXDB_INIT_ORG=rf-sensing
      - DOCKER_INFLUXDB_INIT_BUCKET=csi-data
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - rf-net

volumes:
  influxdb-data:

networks:
  rf-net:
    driver: bridge
