name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: |
          pip install flake8 pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      
      - name: Lint Python (flake8)
        run: |
          if [ -d backend ]; then flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics; fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Node dependencies
        run: |
          if [ -f frontend/package.json ]; then cd frontend && npm ci; fi
      
      - name: Lint JavaScript (eslint)
        run: |
          if [ -f frontend/package.json ]; then cd frontend && npm run lint --if-present; fi
      
      - name: Run Python tests
        run: |
          if [ -d backend ]; then pytest backend/tests/ --if-exists; fi
      
      - name: Run JavaScript tests
        run: |
          if [ -f frontend/package.json ]; then cd frontend && npm test --if-present; fi
